package:
  name: simi-search
  version: 0.1.0

source:
  path: ..

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . --no-deps --ignore-installed -vv
  number: 0
  entry_points:
    - download-lit-pcba = simi_search.scripts.download_lit_pcba:main
    - benchmark-similarity = simi_search.scripts.benchmark_similarity:main

requirements:
  host:
    - python >=3.9
    - pip
    - setuptools >=68
  run:
    - python >=3.9

test:
  imports:
    - simi_search
  commands:
    - download-lit-pcba --help
    - benchmark-similarity --help

about:
  home: https://github.com/ThinhUMP/simi_search
  license: Apache-2.0
  license_file: LICENSE
  summary: Ligand similarity search benchmarking on LIT-PCBA.

extra:
  recipe-maintainers:
    - ThinhUMP
